<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBloom – Contact</title>
    <meta name="description" content="Get in touch with AquaBloom. Questions about fish care, plants, or orders? We're happy to help.">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body class="contact-page">
    <header class="site-header">
        <a class="site-brand" href="index.html">AquaBloom</a>
        <nav class="main-nav" aria-label="Primary">
            <ul class="nav-list">
                <li><a href="fish.html">Fish</a></li>
                <li><a href="plants.html">Plants</a></li>
                <li><a href="supplies.html">Supplies</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="cart.html">Cart (<span id="navCartCount">0</span>)</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section" aria-labelledby="contactHeader">
            <h2 id="contactHeader">Contact</h2>
            <form id="contactForm" class="contact-form">
                <label for="name">Name</label>
                <input id="name" name="name" type="text" required>

                <label for="email">Email</label>
                <input id="email" name="email" type="email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" required></textarea>

                <button class="add-btn" type="submit">Send Message</button>
                <p id="formStatus" class="form-status" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p class="footer-brand">AquaBloom</p>
            <nav aria-label="Footer">
                <ul class="footer-links">
                    <li><a href="fish.html">Fish</a></li>
                    <li><a href="plants.html">Plants</a></li>
                    <li><a href="supplies.html">Supplies</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <p class="footer-copy">&copy; 2025 AquaBloom. Portfolio project.</p>
        </div>
    </footer>
</body>
</html>
