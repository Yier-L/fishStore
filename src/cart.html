<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBloom – Cart</title>
    <meta name="description" content="Review your AquaBloom cart and place your order for freshwater fish, plants, and supplies.">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header class="site-header">
        <a class="site-brand" href="index.html">AquaBloom</a>
        <nav class="main-nav" aria-label="Primary">
            <ul class="nav-list">
                <li><a href="fish.html">Fish</a></li>
                <li><a href="plants.html">Plants</a></li>
                <li><a href="supplies.html">Supplies</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="cart.html">Cart (<span id="navCartCount">0</span>)</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="cart-section" aria-labelledby="cartHeader">
            <h2 id="cartHeader">Cart</h2>
            <div class="listings-box">
                <p class="cart-summary">Items in cart: <strong id="cartCount">0</strong></p>
                <ul id="cartItems" class="cart-list" aria-live="polite"></ul>
                <p class="cart-summary">Subtotal: <strong id="cartSubtotal">$0.00</strong></p>
                <button id="clearCartBtn" class="add-btn" type="button">Clear Cart</button>

                <form id="checkoutForm" class="checkout-form">
                    <h3>Checkout</h3>
                    <label for="checkoutName">Full Name</label>
                    <input id="checkoutName" name="customerName" type="text" required>

                    <label for="checkoutEmail">Email</label>
                    <input id="checkoutEmail" name="customerEmail" type="email" required>

                    <button class="add-btn" type="submit">Place Order</button>
                    <p id="checkoutStatus" class="form-status" aria-live="polite"></p>
                </form>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p class="footer-brand">AquaBloom</p>
            <nav aria-label="Footer">
                <ul class="footer-links">
                    <li><a href="fish.html">Fish</a></li>
                    <li><a href="plants.html">Plants</a></li>
                    <li><a href="supplies.html">Supplies</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <p class="footer-copy">&copy; 2025 AquaBloom. Portfolio project.</p>
        </div>
    </footer>
</body>
</html>
